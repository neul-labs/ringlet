name: Publish to RubyGems

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  publish:
    name: Publish Gem
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Update version
        run: |
          cd packaging/rubygems
          sed -i "s/s.version.*=.*/s.version     = '${{ inputs.version }}'/" ringlet-cli.gemspec
          sed -i "s/VERSION = .*/VERSION = '${{ inputs.version }}'/" lib/ringlet.rb

      - name: Build gem
        run: |
          cd packaging/rubygems
          gem build ringlet-cli.gemspec

      - name: Authenticate with RubyGems via OIDC
        run: |
          # Request GitHub OIDC token
          OIDC_TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')

          # Exchange for RubyGems API key
          RUBYGEMS_KEY=$(curl -s -X POST \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            https://rubygems.org/api/v1/oidc/github_actions_token \
            | jq -r '.rubygems_api_key')

          mkdir -p ~/.gem
          echo ":rubygems_api_key: $RUBYGEMS_KEY" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials

      - name: Publish to RubyGems
        run: |
          cd packaging/rubygems
          gem push ringlet-cli-${{ inputs.version }}.gem
